<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="musicGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#8A2BE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Headphones -->
  <g>
    <!-- Left earcup -->
    <ellipse cx="18" cy="32" rx="12" ry="16" fill="url(#musicGradient)" stroke="none"/>
    <ellipse cx="18" cy="32" rx="10" ry="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Right earcup -->
    <ellipse cx="46" cy="32" rx="12" ry="16" fill="url(#musicGradient)" stroke="none"/>
    <ellipse cx="46" cy="32" rx="10" ry="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Headband -->
    <path d="M 18 16 Q 32 8 46 16" stroke="url(#musicGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 18 16 Q 32 10 46 16" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Musical Note -->
  <g transform="translate(28, 20)">
    <path d="M 4 0 L 4 20 L 2 20 L 2 18 L 0 18 L 0 16 L 2 16 L 2 0 Z" fill="url(#musicGradient)"/>
    <circle cx="6" cy="14" r="3" fill="url(#musicGradient)"/>
    <path d="M 9 14 L 9 8 L 11 8 L 11 6 L 13 6 L 13 8 L 11 8 L 11 14 Z" fill="url(#musicGradient)"/>
  </g>
  
  <!-- Left Equalizer Bars -->
  <g transform="translate(12, 40)">
    <rect x="0" y="0" width="2" height="8" fill="url(#musicGradient)"/>
    <rect x="3" y="2" width="2" height="6" fill="url(#musicGradient)"/>
    <rect x="6" y="1" width="2" height="7" fill="url(#musicGradient)"/>
    <rect x="9" y="3" width="2" height="5" fill="url(#musicGradient)"/>
    <rect x="12" y="0" width="2" height="8" fill="url(#musicGradient)"/>
  </g>
  
  <!-- Right Equalizer Bars -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="2" height="8" fill="url(#musicGradient)"/>
    <rect x="3" y="2" width="2" height="6" fill="url(#musicGradient)"/>
    <rect x="6" y="1" width="2" height="7" fill="url(#musicGradient)"/>
    <rect x="9" y="3" width="2" height="5" fill="url(#musicGradient)"/>
    <rect x="12" y="0" width="2" height="8" fill="url(#musicGradient)"/>
  </g>
</svg>

